name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

# Incremental compilation only helps repeated local builds; in CI it just
# bloats the cache. Turning it off keeps the rust-cache small enough to avoid
# eviction (which is what forces cold rebuilds).
env:
  CARGO_INCREMENTAL: "0"
  CARGO_NET_RETRY: "10"
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux gnu builds pin to ubuntu-24.04 (glibc 2.39) because the
          # prebuilt ort/onnxruntime binaries pulled in by fastembed require
          # `__isoc23_strtol*` symbols introduced in glibc 2.39. End-user
          # floor: Ubuntu 24.04+, Debian 13+, Fedora 40+, RHEL/Rocky 10+.
          # macOS binaries link only system libs and stay portable per arch.
          # The only native build dependency is the mold linker (required by
          # .cargo/config.toml on Linux). It is fetched as a static binary
          # from its GitHub releases instead of apt: the arm64 runners pull
          # from ports.ubuntu.com, whose outages have broken this workflow,
          # while GitHub-to-GitHub downloads share the runner's own
          # infrastructure. protobuf was a leftover — nothing in Cargo.lock
          # uses protoc since the LanceDB migrator moved to its own workflow.
          - name: linux-x86_64
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            deps: curl -fsSL https://github.com/rui314/mold/releases/download/v2.41.0/mold-2.41.0-x86_64-linux.tar.gz | sudo tar -xz --strip-components=1 -C /usr/local
          - name: linux-aarch64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            deps: curl -fsSL https://github.com/rui314/mold/releases/download/v2.41.0/mold-2.41.0-aarch64-linux.tar.gz | sudo tar -xz --strip-components=1 -C /usr/local
          - name: macos-aarch64
            runner: macos-14
            target: aarch64-apple-darwin
            deps: "true"

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      # Only the `lethe` workspace — the migrator (LanceDB/Arrow/DataFusion)
      # builds in its own workflow so its multi-GB target tree never evicts
      # this cache. See .github/workflows/release-migrator.yml.
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
          cache-on-failure: "true"

      - name: Install native dependencies
        run: ${{ matrix.deps }}

      - name: Build lethe
        run: cargo build --release --locked --bin lethe

      - name: Package lethe
        env:
          LETHE_RELEASE_TARGET: ${{ matrix.target }}
        run: scripts/package-release

      - uses: actions/upload-artifact@v7
        with:
          name: lethe-${{ matrix.name }}
          path: |
            dist/*.tar.gz
            dist/*.sha256

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v3
        with:
          files: dist/*
